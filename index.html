<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="VIBY — مساعد المنيو بالعامية المصرية للكافيهات." />
    <meta name="theme-color" content="#F5F1EA" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VIBY" />
    <meta name="format-detection" content="telephone=no" />
    <title>Bareeq × VIBY</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icons/favicon.svg" />
    <link rel="modulepreload" href="./scripts/app.js" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/theme-cafe.css" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/mobile.css" />
    <link rel="stylesheet" href="./styles/splash.css" />
  </head>
  <body>
    <div id="splash" class="splash" aria-hidden="true">
      <div class="splash__stage">
        <div class="splash__beat splash__beat--partner">
          <img
            class="splash__partner-logo"
            id="splashPartnerLogo"
            width="160"
            height="40"
            alt=""
            hidden
          />
        </div>
        <p class="splash__beat splash__beat--viby" aria-hidden="true">VIBY</p>
        <p class="splash__beat splash__beat--powered">Powered by VIBY</p>
        <p class="splash__beat splash__beat--welcome" id="splashWelcome">أهلاً بيك في Bareeq</p>
        <div class="splash__beat splash__beat--loader" aria-hidden="true">
          <span class="splash__loader"></span>
        </div>
      </div>
    </div>

    <div class="app" id="app">
      <header class="header" role="banner">
        <div class="header__leading">
          <a
            class="header__menu"
            id="btnExternalMenu"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            hidden
          >
            <span class="header__menu-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M4 10h16M6 6h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M8 14h8M8 17h5"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="header__menu-label" id="btnExternalMenuLabel">المنيو</span>
          </a>
          <div class="header__brand">
            <img
              class="header__partner-logo"
              id="partnerLogo"
              width="32"
              height="32"
              alt=""
              hidden
            />
            <span class="brand-partner" id="partnerName">Bareeq</span>
            <span class="brand-sep" aria-hidden="true">×</span>
            <span class="brand-viby" aria-label="VIBY">VIBY</span>
          </div>
        </div>
        <button type="button" class="header__action" id="btnRestart" aria-label="محادثة جديدة">
          <span class="header__action-icon" aria-hidden="true"></span>
          <span>من الأول</span>
        </button>
      </header>

      <main class="chat" role="main">
        <div class="vip-mascot" id="vipMascot" aria-hidden="true">
          <div class="vip-mascot__shadow" aria-hidden="true"></div>
          <div class="vip-mascot__float">
            <div class="vip-companion" id="vipCompanion" data-expression="smile">
              <div class="vip-companion__glow" aria-hidden="true"></div>
              
              <!-- Top Accessory -->
              <div class="vip-companion__accessory" aria-hidden="true">
                <!-- Thinking: Bulb -->
                <div class="vip-accessory__bulb">
                  <svg viewBox="0 0 24 24" width="16" height="16">
                    <path fill="currentColor" d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2 18H10c-.55 0-1 .45-1 1s.45 1 1 1h4c.55 0 1-.45 1-1s-.45-1-1-1z"/>
                  </svg>
                </div>
                <!-- Recommendation: Sparkle -->
                <div class="vip-accessory__sparkle">
                  <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M12 2l2.5 7.5L22 12l-7.5 2.5L12 22l-2.5-7.5L2 12l7.5-2.5z"/>
                  </svg>
                </div>
                <!-- Loading: Orbiting dots -->
                <div class="vip-accessory__dots">
                  <span></span><span></span><span></span>
                </div>
                <!-- Success: Golden star -->
                <div class="vip-accessory__star">
                  <svg viewBox="0 0 24 24" width="15" height="15">
                    <path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                  </svg>
                </div>
                <!-- Hover: Gentle particles -->
                <div class="vip-accessory__particles">
                  <span></span><span></span><span></span><span></span>
                </div>
              </div>

              <!-- Spirit Body (Small Coffee Cup inspired) -->
              <div class="vip-companion__body">
                <div class="vip-companion__sheen"></div>
                <div class="vip-companion__cup-handle"></div>
                <div class="vip-companion__cup-brim"></div>
                
                <!-- Face -->
                <div class="vip-companion__face">
                  <div class="vip-companion__eyebrows">
                    <span class="vip-eyebrow vip-eyebrow--left"></span>
                    <span class="vip-eyebrow vip-eyebrow--right"></span>
                  </div>
                  <div class="vip-companion__eyes">
                    <div class="vip-eye vip-eye--left">
                      <span class="vip-eye__lid"></span>
                      <span class="vip-eye__ball">
                        <span class="vip-pupil"></span>
                        <span class="vip-eye__shine"></span>
                      </span>
                    </div>
                    <div class="vip-eye vip-eye--right">
                      <span class="vip-eye__lid"></span>
                      <span class="vip-eye__ball">
                        <span class="vip-pupil"></span>
                        <span class="vip-eye__shine"></span>
                      </span>
                    </div>
                  </div>
                  <div class="vip-mouth" role="presentation"></div>
                </div>
                
                <!-- Cute Spirit Tail -->
                <span class="vip-companion__tail" aria-hidden="true"></span>
              </div>
            </div>
          </div>
        </div>

        <div
          class="chat__messages"
          id="messageList"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
          aria-label="محادثة مع VIBY"
        ></div>

        <div class="chat__reply-dock" id="replyDock" role="region" aria-label="اختيارات الرد"></div>
      </main>

      <footer class="footer">
        <p class="footer__powered">Powered by <strong>VIBY</strong></p>
        <p class="footer__note">الترشيحات اقتراحات — اسأل على الحساسية من التيم.</p>
        <div class="footer__socials" id="socialLinks"></div>
      </footer>
    </div>

    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
